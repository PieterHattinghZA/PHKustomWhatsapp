name: PowerShell validation

on:
  push:
    branches:
      - main
      - fix/simple-gui-active-chats
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install validation modules
        shell: powershell
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Validate module manifest
        shell: powershell
        run: |
          Test-ModuleManifest -Path .\PHKustomWhatsapp.psd1 -ErrorAction Stop | Out-Null

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings .\PSScriptAnalyzerSettings.psd1
          $results | Format-Table -AutoSize
          if ($results.Where({ $_.Severity -eq 'Error' }).Count -gt 0) {
              throw 'PSScriptAnalyzer reported one or more errors.'
          }

      - name: Run Pester
        shell: powershell
        run: |
          $configuration = New-PesterConfiguration
          $configuration.Run.Path = '.\Tests'
          $configuration.Run.Exit = $true
          $configuration.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $configuration
